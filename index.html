<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
</head>
<body>
    <div id="app" data-mode="work">
        <main class="pomodoro-timer">
            <p class="pomodoro-timer__mode" id="mode-indicator">Work</p>

            <div
                class="pomodoro-timer__display time-display"
                id="time-display"
                role="timer"
                aria-live="polite"
            ></div>

            <p class="pomodoro-timer__count" id="pomodoro-count" aria-live="polite">
                0 pomodoros completed
            </p>

            <div class="pomodoro-timer__controls">
                <button
                    type="button"
                    class="pomodoro-timer__button pomodoro-timer__button--primary"
                    id="start-pause-btn"
                >
                    Start
                </button>
                <button
                    type="button"
                    class="pomodoro-timer__button pomodoro-timer__button--secondary"
                    id="reset-btn"
                >
                    Reset
                </button>
            </div>

            <section class="settings-panel" aria-labelledby="settings-heading">
                <h2 class="settings-panel__heading" id="settings-heading">Settings</h2>

                <div class="settings-panel__fields">
                    <div class="settings-panel__field">
                        <label class="settings-panel__label" for="work-duration">
                            Work duration (MM:SS)
                        </label>
                        <input
                            class="settings-panel__input"
                            type="text"
                            id="work-duration"
                            name="work-duration"
                            inputmode="numeric"
                            pattern="[0-9]+:[0-9]{1,2}"
                            placeholder="MM:SS"
                            data-min-seconds="1"
                            data-max-seconds="7200"
                            value="25:00"
                        />
                    </div>

                    <div class="settings-panel__field">
                        <label class="settings-panel__label" for="break-duration">
                            Break duration (MM:SS)
                        </label>
                        <input
                            class="settings-panel__input"
                            type="text"
                            id="break-duration"
                            name="break-duration"
                            inputmode="numeric"
                            pattern="[0-9]+:[0-9]{1,2}"
                            placeholder="MM:SS"
                            data-min-seconds="1"
                            data-max-seconds="3600"
                            value="05:00"
                        />
                    </div>
                </div>

                <button
                    type="button"
                    class="pomodoro-timer__button pomodoro-timer__button--secondary settings-panel__apply"
                    id="apply-settings-btn"
                >
                    Apply settings
                </button>
            </section>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
