<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
</head>
<body>
    <div id="app" data-mode="work">
        <main class="pomodoro-timer">
            <div class="pomodoro-timer__timer">
                <p class="pomodoro-timer__mode" id="mode-indicator">Work</p>

                <div
                    class="pomodoro-timer__display time-display"
                    id="time-display"
                    role="timer"
                    aria-live="polite"
                ></div>
            </div>

            <div class="pomodoro-timer__controls">
                <button
                    type="button"
                    class="pomodoro-timer__button pomodoro-timer__button--primary"
                    id="start-pause-btn"
                >
                    Start
                </button>
                <button
                    type="button"
                    class="pomodoro-timer__button pomodoro-timer__button--secondary"
                    id="reset-btn"
                >
                    Reset
                </button>
            </div>

            <section class="pomodoro-timer__progress" aria-labelledby="progress-heading">
                <h2 class="pomodoro-timer__section-heading" id="progress-heading">Progress</h2>

                <div class="pomodoro-timer__stats" aria-live="polite">
                    <div class="pomodoro-timer__stat">
                        <span class="pomodoro-timer__stat-value" id="pomodoro-count">0</span>
                        <span class="pomodoro-timer__stat-label">Total session completed</span>
                    </div>
                    <div class="pomodoro-timer__stat">
                        <span class="pomodoro-timer__stat-value" id="cycle-count">0</span>
                        <span class="pomodoro-timer__stat-label">Sessions since long break</span>
                    </div>
                </div>
            </section>

            <section class="settings-panel" aria-labelledby="settings-heading">
                <h2 class="pomodoro-timer__section-heading" id="settings-heading">Settings</h2>

                <div class="settings-panel__fields">
                    <div class="settings-panel__field">
                        <label class="settings-panel__label" for="work-duration">Work</label>
                        <input
                            class="settings-panel__input"
                            type="text"
                            id="work-duration"
                            name="work-duration"
                            inputmode="numeric"
                            pattern="[0-9]+:[0-9]{1,2}"
                            placeholder="MM:SS"
                            aria-label="Work duration in minutes and seconds"
                            data-min-seconds="1"
                            data-max-seconds="7200"
                            value="25:00"
                        />
                    </div>

                    <div class="settings-panel__field">
                        <label class="settings-panel__label" for="break-duration">Break</label>
                        <input
                            class="settings-panel__input"
                            type="text"
                            id="break-duration"
                            name="break-duration"
                            inputmode="numeric"
                            pattern="[0-9]+:[0-9]{1,2}"
                            placeholder="MM:SS"
                            aria-label="Break duration in minutes and seconds"
                            data-min-seconds="1"
                            data-max-seconds="3600"
                            value="05:00"
                        />
                    </div>

                    <div class="settings-panel__field">
                        <label class="settings-panel__label" for="long-break-duration">Long break</label>
                        <input
                            class="settings-panel__input"
                            type="text"
                            id="long-break-duration"
                            name="long-break-duration"
                            inputmode="numeric"
                            pattern="[0-9]+:[0-9]{1,2}"
                            placeholder="MM:SS"
                            aria-label="Long break duration in minutes and seconds"
                            data-min-seconds="1"
                            data-max-seconds="3600"
                            value="15:00"
                        />
                    </div>
                </div>

                <button
                    type="button"
                    class="pomodoro-timer__button pomodoro-timer__button--secondary settings-panel__apply"
                    id="apply-settings-btn"
                >
                    Apply
                </button>
            </section>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
